# Render Blueprint - CRE Wrapper Service
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: whitewall-cre-wrapper
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    region: oregon  # or singapore, frankfurt, ohio
    plan: starter  # free, starter, standard, pro
    envVars:
      - key: CRE_ETH_PRIVATE_KEY
        sync: false  # Manual input required (secret)
      - key: CRE_CREDENTIALS
        sync: false  # base64: ~/.cre/cre.yaml
      - key: CRE_PROJECT_YAML
        sync: false  # base64: project.yaml (Infura RPC 포함)
      - key: CRE_TARGET
        value: staging-settings  # 기본값, 필요시 변경
    healthCheckPath: /health_check
