<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A0A0A"/>
      <stop offset="40%" stop-color="#0A1025"/>
      <stop offset="100%" stop-color="#0A0A0A"/>
    </linearGradient>
    <linearGradient id="fadeL" x1="0%" y1="0%" x2="20%" y2="0%">
      <stop offset="0%" stop-color="#0A0A0A"/>
      <stop offset="100%" stop-color="#0A0A0A" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="fadeR" x1="85%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0A0A0A" stop-opacity="0"/>
      <stop offset="100%" stop-color="#0A0A0A"/>
    </linearGradient>
    <linearGradient id="fadeT" x1="0%" y1="0%" x2="0%" y2="8%">
      <stop offset="0%" stop-color="#0A0A0A"/>
      <stop offset="100%" stop-color="#0A0A0A" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="fadeB" x1="0%" y1="92%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0A0A0A" stop-opacity="0"/>
      <stop offset="100%" stop-color="#0A0A0A"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="400" fill="url(#bg)"/>

  <!-- Subtle perspective mesh -->
  <g opacity="0.05" stroke="#EEEEEE" stroke-width="0.7" fill="none">
    <line x1="500" y1="0" x2="1300" y2="180"/><line x1="500" y1="80" x2="1300" y2="188"/>
    <line x1="500" y1="160" x2="1300" y2="195"/><line x1="500" y1="240" x2="1300" y2="205"/>
    <line x1="500" y1="320" x2="1300" y2="212"/><line x1="500" y1="400" x2="1300" y2="220"/>
    <line x1="580" y1="0" x2="585" y2="400"/><line x1="700" y1="0" x2="698" y2="400"/>
    <line x1="820" y1="0" x2="812" y2="400"/><line x1="940" y1="0" x2="925" y2="400"/>
    <line x1="1060" y1="0" x2="1040" y2="400"/>
  </g>

  <!-- Pipeline: three workflow lanes -->
  <!-- Lane lines -->
  <line x1="620" y1="85" x2="1100" y2="85" stroke="#222222" stroke-width="0.8"/>
  <line x1="620" y1="200" x2="1100" y2="200" stroke="#222222" stroke-width="0.8"/>
  <line x1="620" y1="315" x2="1100" y2="315" stroke="#222222" stroke-width="0.8"/>

  <!-- Trigger dots (left) -->
  <circle cx="630" cy="85" r="8" fill="#375BD2" opacity="0.1"/>
  <circle cx="630" cy="85" r="4" fill="#375BD2" opacity="0.6"/>
  <circle cx="630" cy="200" r="8" fill="#2EAD6B" opacity="0.1"/>
  <circle cx="630" cy="200" r="4" fill="#2EAD6B" opacity="0.6"/>
  <circle cx="630" cy="315" r="8" fill="#D94040" opacity="0.1"/>
  <circle cx="630" cy="315" r="4" fill="#D94040" opacity="0.6"/>

  <!-- DON box -->
  <rect x="750" y="45" width="210" height="310" rx="8" fill="#141414" fill-opacity="0.5" stroke="#222222" stroke-width="0.8"/>
  <text x="855" y="36" font-family="Inter, system-ui, sans-serif" font-size="8" font-weight="700" fill="#666666" text-anchor="middle" letter-spacing="2">DON TEE ENCLAVE</text>

  <!-- Workflow boxes inside DON -->
  <rect x="770" y="67" width="170" height="36" rx="5" fill="#375BD2" fill-opacity="0.08" stroke="#375BD2" stroke-width="0.8"/>
  <text x="855" y="90" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#EEEEEE" text-anchor="middle">accessRequest</text>

  <rect x="770" y="182" width="170" height="36" rx="5" fill="#2EAD6B" fill-opacity="0.08" stroke="#2EAD6B" stroke-width="0.8"/>
  <text x="855" y="205" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#EEEEEE" text-anchor="middle">kycValidation</text>

  <rect x="770" y="297" width="170" height="36" rx="5" fill="#D94040" fill-opacity="0.08" stroke="#D94040" stroke-width="0.8"/>
  <text x="855" y="320" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#EEEEEE" text-anchor="middle">creditValidation</text>

  <!-- Output dots (right) -->
  <circle cx="1080" cy="85" r="8" fill="#375BD2" opacity="0.1"/>
  <circle cx="1080" cy="85" r="4" fill="#375BD2" opacity="0.6"/>
  <circle cx="1080" cy="200" r="8" fill="#2EAD6B" opacity="0.1"/>
  <circle cx="1080" cy="200" r="4" fill="#2EAD6B" opacity="0.6"/>
  <circle cx="1080" cy="315" r="8" fill="#D94040" opacity="0.1"/>
  <circle cx="1080" cy="315" r="4" fill="#D94040" opacity="0.6"/>

  <!-- Target labels -->
  <text x="1095" y="82" font-family="Inter, system-ui, sans-serif" font-size="8" font-weight="600" fill="#375BD2" opacity="0.6">Consumer</text>
  <text x="1095" y="197" font-family="Inter, system-ui, sans-serif" font-size="8" font-weight="600" fill="#2EAD6B" opacity="0.6">KYCValidator</text>
  <text x="1095" y="312" font-family="Inter, system-ui, sans-serif" font-size="8" font-weight="600" fill="#D94040" opacity="0.6">CreditValidator</text>

  <!-- Fades -->
  <rect width="1200" height="400" fill="url(#fadeL)"/>
  <rect width="1200" height="400" fill="url(#fadeR)"/>
  <rect width="1200" height="400" fill="url(#fadeT)"/>
  <rect width="1200" height="400" fill="url(#fadeB)"/>

  <!-- Logo -->
  <rect x="80" y="132" width="7" height="40" rx="1.5" fill="#EEEEEE" opacity="0.3"/>
  <rect x="93" y="132" width="7" height="40" rx="1.5" fill="#EEEEEE" opacity="0.6"/>
  <rect x="106" y="132" width="7" height="40" rx="1.5" fill="#EEEEEE" opacity="0.9"/>
  <text x="126" y="165" font-family="Inter, system-ui, sans-serif" font-size="32" font-weight="900" letter-spacing="3" fill="#EEEEEE">WHITEWALL</text>
  <text x="82" y="198" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="700" fill="#375BD2" letter-spacing="3">CRE WORKFLOWS</text>
  <text x="82" y="235" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="400" fill="#666666">Chainlink CRE verification workflows for Whitewall OS</text>
</svg>
