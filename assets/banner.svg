<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A0A0A"/>
      <stop offset="50%" stop-color="#0A1025"/>
      <stop offset="100%" stop-color="#0A0A0A"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="400" fill="url(#bg)"/>

  <!-- Workflow pipeline visualization -->
  <!-- Trigger nodes -->
  <g transform="translate(650, 80)">
    <rect x="-60" y="-20" width="120" height="40" rx="6" fill="none" stroke="#375BD2" stroke-width="1.5" opacity="0.6"/>
    <text x="0" y="5" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="#375BD2" text-anchor="middle" letter-spacing="1">HTTP TRIGGER</text>
  </g>
  <g transform="translate(650, 200)">
    <rect x="-60" y="-20" width="120" height="40" rx="6" fill="none" stroke="#FF9F1C" stroke-width="1.5" opacity="0.6"/>
    <text x="0" y="5" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="#FF9F1C" text-anchor="middle" letter-spacing="1">LOG TRIGGER</text>
  </g>
  <g transform="translate(650, 320)">
    <rect x="-60" y="-20" width="120" height="40" rx="6" fill="none" stroke="#FF9F1C" stroke-width="1.5" opacity="0.6"/>
    <text x="0" y="5" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="#FF9F1C" text-anchor="middle" letter-spacing="1">LOG TRIGGER</text>
  </g>

  <!-- Connecting lines -->
  <line x1="710" y1="80" x2="810" y2="80" stroke="#375BD2" stroke-width="1" opacity="0.3"/>
  <line x1="710" y1="200" x2="810" y2="200" stroke="#FF9F1C" stroke-width="1" opacity="0.3"/>
  <line x1="710" y1="320" x2="810" y2="320" stroke="#FF9F1C" stroke-width="1" opacity="0.3"/>

  <!-- DON TEE box -->
  <rect x="810" y="40" width="200" height="320" rx="8" fill="#141414" fill-opacity="0.6" stroke="#222222" stroke-width="1"/>
  <text x="910" y="30" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="700" fill="#666666" text-anchor="middle" letter-spacing="2">DON TEE ENCLAVE</text>

  <!-- Workflow handlers inside DON -->
  <g transform="translate(910, 80)">
    <rect x="-70" y="-18" width="140" height="36" rx="5" fill="#375BD2" fill-opacity="0.15" stroke="#375BD2" stroke-width="1"/>
    <text x="0" y="5" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#EEEEEE" text-anchor="middle">accessRequest</text>
  </g>
  <g transform="translate(910, 200)">
    <rect x="-70" y="-18" width="140" height="36" rx="5" fill="#2EAD6B" fill-opacity="0.15" stroke="#2EAD6B" stroke-width="1"/>
    <text x="0" y="5" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#EEEEEE" text-anchor="middle">kycValidation</text>
  </g>
  <g transform="translate(910, 320)">
    <rect x="-70" y="-18" width="140" height="36" rx="5" fill="#D94040" fill-opacity="0.15" stroke="#D94040" stroke-width="1"/>
    <text x="0" y="5" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#EEEEEE" text-anchor="middle">creditValidation</text>
  </g>

  <!-- Output arrows -->
  <line x1="1010" y1="80" x2="1100" y2="80" stroke="#375BD2" stroke-width="1" opacity="0.3"/>
  <line x1="1010" y1="200" x2="1100" y2="200" stroke="#2EAD6B" stroke-width="1" opacity="0.3"/>
  <line x1="1010" y1="320" x2="1100" y2="320" stroke="#D94040" stroke-width="1" opacity="0.3"/>

  <!-- Target labels -->
  <text x="1110" y="75" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="600" fill="#666666" letter-spacing="0.5">Consumer</text>
  <text x="1110" y="88" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="600" fill="#375BD2" letter-spacing="0.5">writeReport</text>
  <text x="1110" y="195" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="600" fill="#666666" letter-spacing="0.5">KYCValidator</text>
  <text x="1110" y="208" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="600" fill="#2EAD6B" letter-spacing="0.5">writeReport</text>
  <text x="1110" y="315" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="600" fill="#666666" letter-spacing="0.5">CreditValidator</text>
  <text x="1110" y="328" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="600" fill="#D94040" letter-spacing="0.5">writeReport</text>

  <!-- Logo + Title (left side) -->
  <rect x="80" y="148" width="5" height="28" rx="1" fill="#EEEEEE" opacity="0.3"/>
  <rect x="90" y="148" width="5" height="28" rx="1" fill="#EEEEEE" opacity="0.6"/>
  <rect x="100" y="148" width="5" height="28" rx="1" fill="#EEEEEE" opacity="0.9"/>
  <text x="118" y="172" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="900" letter-spacing="2" fill="#EEEEEE">WHITEWALL</text>
  <text x="82" y="200" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" fill="#375BD2" letter-spacing="3">CRE WORKFLOWS</text>

  <text x="82" y="240" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="400" fill="#666666">Chainlink CRE verification workflows</text>
  <text x="82" y="258" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="400" fill="#666666">for Whitewall OS</text>
</svg>
